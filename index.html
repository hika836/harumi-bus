<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", sans-serif;
  background: #f5f4f0;
  color: #1a1a1a;
  min-height: 100dvh;
}
.wrap { padding: 16px; max-width: 600px; margin: 0 auto; }
.clock {
  text-align: center;
  background: #fff;
  border-radius: 14px;
  border: 0.5px solid rgba(0,0,0,0.1);
  padding: 16px;
  margin-bottom: 14px;
}
.clock-time { font-size: 42px; font-weight: 500; letter-spacing: 2px; color: #1a1a1a; }
.clock-date { font-size: 14px; color: #888; margin-top: 2px; }
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
@media (max-width: 360px) { .grid { grid-template-columns: 1fr; } }
.card {
  background: #fff;
  border-radius: 14px;
  border: 0.5px solid rgba(0,0,0,0.1);
  padding: 14px 14px 10px;
}
.card-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px; }
.badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; white-space: nowrap; margin-top: 2px; }
.badge-brt { background: #deedfb; color: #0c447c; }
.badge-toei { background: #e4f2d8; color: #27500a; }
.dest { font-size: 15px; font-weight: 500; color: #1a1a1a; }
.stop { font-size: 11px; color: #999; margin-top: 1px; }
.bus-row {
  display: flex; align-items: baseline;
  justify-content: space-between;
  padding: 6px 0;
  border-top: 0.5px solid rgba(0,0,0,0.08);
}
.bus-row:first-of-type { border-top: none; }
.bus-label { font-size: 12px; color: #999; flex-shrink: 0; }
.bus-right { display: flex; align-items: baseline; gap: 5px; flex-wrap: wrap; justify-content: flex-end; }
.bus-time { font-size: 22px; font-weight: 500; color: #1a1a1a; font-variant-numeric: tabular-nums; }
.bus-min { font-size: 12px; color: #aaa; }
.bus-min.soon { color: #ba7517; font-weight: 500; }
.bus-min.urgent { color: #a32d2d; font-weight: 500; }
.ichiba-tag {
  font-size: 10px; font-weight: 500;
  padding: 1px 6px; border-radius: 20px;
  background: #faeeda; color: #633806;
}
.nobus { font-size: 12px; color: #bbb; padding: 4px 0; }
.footer { text-align: center; font-size: 11px; color: #bbb; margin-top: 16px; padding-bottom: 16px; }
@media (prefers-color-scheme: dark) {
  body { background: #1c1c1e; color: #f0f0f0; }
  .clock, .card { background: #2c2c2e; border-color: rgba(255,255,255,0.08); }
  .clock-time, .dest, .bus-time { color: #f0f0f0; }
  .clock-date, .stop, .bus-label, .bus-min, .nobus { color: #888; }
  .bus-row { border-color: rgba(255,255,255,0.07); }
  .badge-brt { background: #0c3060; color: #85b7eb; }
  .badge-toei { background: #1a3a0a; color: #97c459; }
  .ichiba-tag { background: #3a2a10; color: #fac775; }
  .bus-min.soon { color: #ef9f27; }
  .bus-min.urgent { color: #f09595; }
}
</style>

function getNextBuses(route, now, count) {
  const tt = route[getDayType(now)] || {};
  const cur = now.getHours()*60 + now.getMinutes();
  const results = [];
  for (const hr of Object.keys(tt).map(Number).sort((a,b)=>a-b)) {
    for (const entry of tt[hr]) {
      const t = hr*60 + entry.m;
      if (t >= cur) {
        results.push({h:hr, m:entry.m, diff:t-cur, ichiba:!!entry.ichiba});
        if (results.length >= count) return results;
      }
    }
  }
  return results;
}

function pad(n) { return String(n).padStart(2,'0'); }

function renderRow(bus, label) {
  if (!bus) return `<div class="bus-row"><span class="bus-label">${label}</span><span class="nobus">本日終了</span></div>`;
  const d = bus.diff;
  let minCls = 'bus-min', minTxt;
  if (d===0)      { minTxt='まもなく'; minCls+=' urgent'; }
  else if (d<=5)  { minTxt=`あと${d}分`; minCls+=' urgent'; }
  else if (d<=15) { minTxt=`あと${d}分`; minCls+=' soon'; }
  else            { minTxt=`あと${d}分`; }
  const ichiba = bus.ichiba ? `<span class="ichiba-tag">市場前経由</span>` : '';
  return `<div class="bus-row">
    <span class="bus-label">${label}</span>
    <span class="bus-right">
      ${ichiba}
      <span class="bus-time">${pad(bus.h)}:${pad(bus.m)}</span>
      <span class="${minCls}">${minTxt}</span>
    </span>
  </div>`;
}

function renderCard(route, now) {
  const buses = getNextBuses(route, now, 2);
  return `<div class="card">
    <div class="card-header">
      <span class="badge ${route.type==='brt'?'badge-brt':'badge-toei'}">${route.line}</span>
      <div>
        <div class="dest">${route.dest}行き</div>
        <div class="stop">${route.stop}</div>
      </div>
    </div>
    ${renderRow(buses[0],'次の便')}
    ${renderRow(buses[1],'その次')}
  </div>`;
}


function updateClock() {
  const now = new Date();
  document.getElementById('now-time').textContent =
    `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  const days=['日','月','火','水','木','金','土'];
  const dt = getDayType(now);
  const dlabel = dt==='weekday'?'平日':dt==='saturday'?'土曜':'日祝';
  document.getElementById('now-date').textContent =
    `${now.getMonth()+1}月${now.getDate()}日（${days[now.getDay()]}） ${dlabel}ダイヤ`;
}

  const now = new Date();

}
